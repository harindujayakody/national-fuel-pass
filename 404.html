<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 – Page Not Found | Sri Lanka National Fuel Pass</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--r:#D42020;--r2:#A81A1A;--fh:'Poppins',sans-serif}
html,body{height:100%;font-family:var(--fh);background:#fff;color:#1A1520;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;position:relative}

/* Background dots */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(212,32,32,.1) 1px,transparent 1px);background-size:30px 30px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 20%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 20%,transparent 100%);pointer-events:none}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 100% 0%,rgba(212,32,32,.07),transparent 60%),radial-gradient(ellipse 50% 50% at 0% 100%,rgba(212,32,32,.05),transparent 60%);pointer-events:none}

.card{position:relative;z-index:1;max-width:440px;width:100%}

/* Logo */
.logo{display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:40px}
.logo img{height:28px;width:auto;object-fit:contain}
.logo-text{font-weight:800;font-size:.85rem;letter-spacing:2px;color:#111;text-transform:uppercase}
.logo-text span{color:var(--r)}

/* Error code */
.err-code{
  font-size:clamp(5rem,20vw,8rem);font-weight:900;
  line-height:1;letter-spacing:-4px;
  background:linear-gradient(135deg,var(--r) 0%,#FF5555 50%,var(--r2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;
}
.err-icon{font-size:2.8rem;margin-bottom:16px;color:#E5E7EB}
.err-title{font-size:1.3rem;font-weight:800;color:#111;margin-bottom:8px;letter-spacing:-.3px}
.err-msg{font-size:.88rem;color:#6B7280;line-height:1.7;max-width:340px;margin:0 auto 32px}

/* Actions */
.actions{display:flex;flex-direction:column;gap:10px;width:100%}
.btn-red{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 28px;background:var(--r);color:#fff;
  border:none;border-radius:12px;font-family:var(--fh);
  font-size:.88rem;font-weight:700;letter-spacing:1px;text-decoration:none;
  text-transform:uppercase;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 16px rgba(212,32,32,.28);
}
.btn-red:hover{background:var(--r2);transform:translateY(-1px);box-shadow:0 6px 22px rgba(212,32,32,.38)}
.btn-ghost{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 28px;background:transparent;color:var(--r);
  border:2px solid var(--r);border-radius:12px;font-family:var(--fh);
  font-size:.85rem;font-weight:700;letter-spacing:1px;text-decoration:none;
  text-transform:uppercase;cursor:pointer;transition:all .2s;
}
.btn-ghost:hover{background:var(--r);color:#fff}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:8px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E5E7EB}
.divider span{font-size:.65rem;color:#9CA3AF;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* Footer */
.err-foot{margin-top:36px;font-size:.62rem;color:#9CA3AF;line-height:1.8}
.err-foot a{color:var(--r);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="/">
    <img src="assets/logo.png" alt="FuelPass Logo" onerror="this.style.display='none'"/>
    <span class="logo-text">FUEL<span>PASS</span></span>
  </a>

  <div class="err-icon"><i class="fa-solid fa-map-location-dot"></i></div>
  <div class="err-code">404</div>
  <h1 class="err-title">Page Not Found</h1>
  <p class="err-msg">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

  <div class="actions">
    <a class="btn-red" href="/"><i class="fa-solid fa-house"></i> Go to Homepage</a>
    <div class="divider"><span>or</span></div>
    <a class="btn-ghost" href="/docs.html"><i class="fa-solid fa-book-open"></i> View Guide</a>
  </div>

  <div class="err-foot">
    <a href="/">Sri Lanka National Fuel Pass</a> · Made by <a href="https://infiax.com" target="_blank" rel="noopener">Infiax Pvt Ltd</a>
  </div>
</div>
</body>
</html>
