<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>503 – Service Unavailable | Sri Lanka National Fuel Pass</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--r:#D42020;--r2:#A81A1A;--fh:'Poppins',sans-serif}
html,body{height:100%;font-family:var(--fh);background:#fff;color:#1A1520;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(212,32,32,.1) 1px,transparent 1px);background-size:30px 30px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 20%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 20%,transparent 100%);pointer-events:none}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 100% 0%,rgba(212,32,32,.07),transparent 60%),radial-gradient(ellipse 50% 50% at 0% 100%,rgba(212,32,32,.05),transparent 60%);pointer-events:none}
.card{position:relative;z-index:1;max-width:440px;width:100%}
.logo{display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:40px}
.logo img{height:28px;width:auto;object-fit:contain}
.logo-text{font-weight:800;font-size:.85rem;letter-spacing:2px;color:#111;text-transform:uppercase}
.logo-text span{color:var(--r)}
.err-code{font-size:clamp(5rem,20vw,8rem);font-weight:900;line-height:1;letter-spacing:-4px;background:linear-gradient(135deg,var(--r) 0%,#FF5555 50%,var(--r2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.err-icon{font-size:2.8rem;margin-bottom:16px;color:#E5E7EB}
.err-title{font-size:1.3rem;font-weight:800;color:#111;margin-bottom:8px;letter-spacing:-.3px}
.err-msg{font-size:.88rem;color:#6B7280;line-height:1.7;max-width:340px;margin:0 auto 32px}
.actions{display:flex;flex-direction:column;gap:10px;width:100%}
.btn-red{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--r);color:#fff;border:none;border-radius:12px;font-family:var(--fh);font-size:.88rem;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(212,32,32,.28)}
.btn-red:hover{background:var(--r2);transform:translateY(-1px)}
.err-foot{margin-top:36px;font-size:.62rem;color:#9CA3AF;line-height:1.8}
.err-foot a{color:var(--r);text-decoration:none;font-weight:700}
/* Pulse */
.pulse{animation:pulse 2s ease-in-out infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.92)}}
/* Countdown */
.countdown{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:#FFF1F1;border:1px solid rgba(212,32,32,.15);border-radius:10px;padding:10px 18px;margin-bottom:24px;font-size:.82rem;color:var(--r);font-weight:700}
.countdown-num{font-size:1.1rem;font-weight:900;min-width:24px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="/">
    <img src="assets/logo.png" alt="FuelPass Logo" onerror="this.style.display='none'"/>
    <span class="logo-text">FUEL<span>PASS</span></span>
  </a>

  <div class="err-icon"><span class="pulse"><i class="fa-solid fa-triangle-exclamation"></i></span></div>
  <div class="err-code">503</div>
  <h1 class="err-title">Service Unavailable</h1>
  <p class="err-msg">We're temporarily down for maintenance. We'll be back shortly. Auto-refreshing in:</p>

  <div class="countdown">
    <i class="fa-regular fa-clock"></i>
    <span class="countdown-num" id="cnt">30</span> seconds
  </div>

  <div class="actions">
    <a class="btn-red" href="javascript:location.reload()"><i class="fa-solid fa-rotate-right"></i> Refresh Now</a>
  </div>

  <div class="err-foot">
    <a href="/">Sri Lanka National Fuel Pass</a> · Made by <a href="https://infiax.com" target="_blank" rel="noopener">Infiax Pvt Ltd</a>
  </div>
</div>
<script>
var n=30;
var el=document.getElementById('cnt');
var t=setInterval(function(){
  n--;el.textContent=n;
  if(n<=0){clearInterval(t);location.reload();}
},1000);
</script>
</body>
</html>
